# EstateGuard — Docker Compose (use ./start.sh to launch)
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: estateguard
      POSTGRES_PASSWORD: estateguard
      POSTGRES_DB: estateguard
    ports:
      - "${EG_POSTGRES_PORT:-19002}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estateguard -d estateguard"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  redis:
    image: valkey/valkey:8
    ports:
      - "${EG_REDIS_PORT:-19003}:6379"
    restart: unless-stopped

  api:
    build:
      context: ./services/api
    ports:
      - "${EG_API_PORT:-19001}:8000"
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+asyncpg://estateguard:estateguard@postgres:5432/estateguard}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:19000}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "${EG_WEB_PORT:-19000}:${EG_WEB_PORT:-19000}"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:19001}
      API_INTERNAL_URL: http://api:8000
      EG_WEB_PORT: ${EG_WEB_PORT:-19000}
    depends_on:
      api:
        condition: service_healthy
    command: ["sh", "docker-entrypoint.sh"]
    restart: unless-stopped

volumes:
  pgdata:
  web_node_modules:
